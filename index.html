<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متابعة الصلوات</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  text-align: center;
 }

.container {
    background-image: url("IMG_7685.JPG");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    
    background-color: rgba(255, 255, 255, 0.3);
    background-blend-mode: lighten;
    backdrop-filter: blur(8px);
    
    max-width: 300px;
    margin: auto;
    padding: 20px;
    
    border-radius: 16px;
    overflow: hidden;
    
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
}

h2{
    color: white;
    margin-bottom:20px;
    text-shadow: black 10px 10px 10px ;
}

.prayer{
    display:flex;
    justify-content:space-between;
    margin:12px 0;
    padding:10px;
    background:#fff;
    border-radius:10px;
}

button{
    margin-top:20px;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
}
</style>
</head>
<body>

<div class="container">
    <h2>✅ متابعة الصلوات</h2>

    <div class="prayer">
        <label>الفجر</label>
        <input type="checkbox" class="check">
    </div>

    <div class="prayer">
        <label>الظهر</label>
        <input type="checkbox" class="check">
    </div>

    <div class="prayer">
        <label>العصر</label>
        <input type="checkbox" class="check">
    </div>

    <div class="prayer">
        <label>المغرب</label>
        <input type="checkbox" class="check">
    </div>

    <div class="prayer">
        <label>العشاء</label>
        <input type="checkbox" class="check">
    </div>

    <button onclick="resetChecks()">يوم جديد 🔄</button>
</div>

<script>
function saveChecks(){
    let checks = document.querySelectorAll(".check");

    checks.forEach((box,index)=>{
        localStorage.setItem("prayer"+index, box.checked);
    });
}

function loadChecks(){
    let checks = document.querySelectorAll(".check");

    checks.forEach((box,index)=>{
        let saved = localStorage.getItem("prayer"+index);
        box.checked = saved === "true";

        box.addEventListener("change", saveChecks);
    });
}

function resetChecks(){
    let checks = document.querySelectorAll(".check");

    checks.forEach((box,index)=>{
        box.checked = false;
        localStorage.setItem("prayer"+index,false);
    });
}

loadChecks();
</script>

</body>
</html>
